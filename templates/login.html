<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>登录 - {{ app_title }}</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Microsoft YaHei', system-ui, sans-serif;
  background: #ecf0f1;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
}
.login-card {
  background: #fff; border-radius: 8px;
  padding: 40px; width: 400px; max-width: 90vw;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}
.login-card .logo {
  width: 60px; height: 60px;
  background: linear-gradient(135deg, #2980b9, #3498db);
  border-radius: 50%; margin: 0 auto 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; color: #fff;
}
.login-card h1 { font-size: 20px; color: #1a5276; text-align: center; margin-bottom: 4px; }
.login-card .subtitle { font-size: 13px; color: #7f8c8d; text-align: center; margin-bottom: 24px; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 13px; color: #2c3e50; margin-bottom: 4px; font-weight: 600; }
.form-group input {
  width: 100%; padding: 10px 12px; border: 1px solid #d5dbdf; border-radius: 4px;
  font-size: 14px; background: #f8f9fa; outline: none; transition: border-color 0.2s;
}
.form-group input:focus { border-color: #2980b9; background: #fff; }
.form-group input::placeholder { color: #bdc3c7; font-size: 13px; }
.btn-login {
  width: 100%; padding: 10px; background: #2980b9; color: #fff;
  border: none; border-radius: 4px; font-size: 15px; cursor: pointer;
  transition: background 0.2s; margin-top: 8px;
}
.btn-login:hover { background: #3498db; }
.error { color: #e74c3c; font-size: 13px; margin-bottom: 12px; text-align: center; padding: 8px; background: #fdf0ef; border-radius: 4px; }
.hint { text-align: center; font-size: 12px; color: #95a5a6; margin-top: 20px; }
</style>
</head>
<body>
<div class="login-card">
  <div class="logo">🏭</div>
  <h1>中科恒泰隧道炉</h1>
  <div class="subtitle">排产与生产可视化系统</div>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="post" action="/login">
    <div class="form-group">
      <label>用户名</label>
      <input type="text" name="username" required autofocus placeholder="测试用户名 admin">
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" name="password" required placeholder="测试密码 262626">
    </div>
    <button type="submit" class="btn-login">登 录</button>
  </form>
  <div class="hint">首次使用请联系管理员创建账号</div>
</div>
</body>
</html>
